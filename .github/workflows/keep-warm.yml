name: Keep Render warm

# Render's free tier puts the service to sleep after 15 minutes of inactivity
# (~50 s cold start). This pings the API every ~10 minutes during hours when
# someone is likely to open the demo (≈ 7:30 AM – 11:20 PM IST), which keeps
# the monthly free instance-hours budget (750 h/workspace) comfortably intact.
#
# Note: GitHub disables scheduled workflows after 60 days without repo
# activity — any commit resets the clock.

on:
  schedule:
    # minutes offset from :00 to dodge GitHub's top-of-the-hour congestion;
    # hours are UTC (2-17 UTC ≈ 7:30-23:20 IST)
    - cron: '4,14,24,34,44,54 2-17 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping model-info endpoint
        run: |
          # -m 90: allow for a ~50 s cold start if the service was asleep
          # --retry 2: ride out transient network hiccups
          curl -fsS -m 90 --retry 2 --retry-delay 5 \
            https://sentiment-analysis-n0a7.onrender.com/api/sentiment/model-info \
            | head -c 300
          echo
          echo "Service is warm."
