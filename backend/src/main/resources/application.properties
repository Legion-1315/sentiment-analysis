spring.application.name=sentisense
# Bind to the platform-provided port in production (Render/Heroku set $PORT), 8080 locally
server.port=${PORT:8080}

# H2 file-backed database so analysis history survives restarts
spring.datasource.url=jdbc:h2:file:./data/sentisense;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.sentisense=INFO
